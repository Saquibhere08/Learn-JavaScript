<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:#f5f5f5;
            padding:20px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        #cardcontainer{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
        }

        .card{
            width:250px;
            background:white;
            border-radius:10px;
            padding:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.2);
            text-align:center;
        }

        .card img{
            width:200px;
            height:200px;
            object-fit:contain;
        }

        .card h2{
            font-size:18px;
            margin:10px 0;
        }

        .card p{
            color:green;
            font-size:20px;
            font-weight:bold;
        }
    </style>

</head>
<body>

    <h1>Product List</h1>

    <div id="cardcontainer">

    </div>

    <script src="./fetch.js"></script>

</body>
</html>
