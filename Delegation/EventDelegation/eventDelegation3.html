<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegation</title>
    <style>
        header{
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid;
        }
        #cardContainer{
            display: flex;
            justify-content: space-around;
            margin: 10px;

        }

        .card{
            border: 1px solid;
            padding: 10px;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo" alt="logo">
        <p>Cart <sup></sup></p>
    </header>
    <div id="cardContainer">
        <div class="card">
            <h2>Watch</h2>
            <p>10000RS.</p>
            <button>add to cart</button>
        </div>
        <div class="card">
            <h2>Car</h2>
            <p>1000000RS.</p>
            <button>add to cart</button>
        </div>
        <div class="card">
            <h2>Tshirt</h2>
            <p>100RS.</p>
            <button>add to cart</button>
        </div>

    </div>
    <script src="./eventDelegation3.js"></script>
</body>
</html>
